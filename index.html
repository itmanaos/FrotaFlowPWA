
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3067/3067451.png" />
    <title>FrotaFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        -webkit-tap-highlight-color: transparent;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* Customização do scanner e animações */
      #qr-reader video {
        border-radius: 2rem !important;
        object-fit: cover !important;
        width: 100% !important;
        height: 100% !important;
      }

      .scanner-laser {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: #3b82f6;
        box-shadow: 0 0 15px 3px rgba(59, 130, 246, 0.8);
        z-index: 20;
        animation: laser-scan 2s linear infinite;
        pointer-events: none;
      }

      @keyframes laser-scan {
        0% { top: 10%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 90%; opacity: 0; }
      }

      .scanner-corner {
        position: absolute;
        width: 30px;
        height: 30px;
        border: 5px solid #3b82f6;
        z-index: 21;
        pointer-events: none;
      }

      .sc-tl { top: 0; left: 0; border-right: 0; border-bottom: 0; border-top-left-radius: 1.5rem; }
      .sc-tr { top: 0; right: 0; border-left: 0; border-bottom: 0; border-top-right-radius: 1.5rem; }
      .sc-bl { bottom: 0; left: 0; border-right: 0; border-top: 0; border-bottom-left-radius: 1.5rem; }
      .sc-br { bottom: 0; right: 0; border-left: 0; border-top: 0; border-bottom-right-radius: 1.5rem; }

      .scanner-shroud {
        position: absolute;
        inset: 0;
        box-shadow: 0 0 0 100vmax rgba(0, 0, 0, 0.5);
        z-index: 10;
        pointer-events: none;
        border-radius: 2rem;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
      .animate-shake {
        animation: shake 0.3s ease-in-out infinite;
      }

      @media print {
        body * {
          visibility: hidden;
        }
        #root, #root * {
          visibility: hidden;
        }
        /* Only show the modal content when printing */
        .fixed.inset-0.bg-black\/70 {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: auto;
          background: white !important;
          visibility: visible !important;
          display: block !important;
          z-index: 9999;
        }
        .fixed.inset-0.bg-black\/70 * {
          visibility: visible !important;
        }
        .fixed.inset-0.bg-black\/70 .bg-white {
          box-shadow: none !important;
          border: none !important;
          width: 100% !important;
          max-width: none !important;
          position: relative !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        /* Hide buttons in print */
        button, .flex.items-center.space-x-2 button {
          display: none !important;
        }
        .sticky.top-0 {
          position: relative !important;
          background: white !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
